<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — AuctionHub Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../assets/css/shared.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />

  <script src="../assets/js/auth.js"></script>
  <script>guardAdmin();</script>
</head>
<body>

<div class="app">

  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><span class="brand-mark">A</span><span>AuctionHub</span></div>
    <nav class="sidebar-nav">
      <a class="snav-item" href="dashboard.html"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Main</a>
      <a class="snav-item" href="analytics.html"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>Analytics</a>
      <a class="snav-item" href="products.html"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>Products</a>
      <a class="snav-item" href="auctions.html"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m14 13-7.5 7.5c-.83.83-2.17.83-3 0a2.12 2.12 0 0 1 0-3L11 10"/><path d="m16 16 6-6"/><path d="m8 8 6-6"/><path d="m9 7 8 8"/><path d="m21 11-8-8"/></svg>Auctions</a>
      <a class="snav-item" href="orders.html"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>Orders</a>
      <a class="snav-item is-active" href="settings.html"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</a>
    </nav>
    <div class="sidebar-foot">
      <div class="user-chip">
        <div class="user-avatar" id="user-initial">A</div>
        <div class="user-info">
          <div class="user-name" id="user-email">admin@gmail.com</div>
          <div class="user-role">Administrator</div>
        </div>
        <button class="logout-btn" id="logout-btn" aria-label="Logout"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
      </div>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-trigger" id="menu-trigger" aria-label="Open menu"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <div>
          <div class="topbar-title">Settings</div>
          <div class="topbar-crumbs">Admin <span>›</span> Settings</div>
        </div>
      </div>
    </header>

    <main class="page">

      <div class="tabs" id="settings-tabs">
        <button class="tab" data-tab="profile">Profile</button>
        <button class="tab is-active" data-tab="payment">Payment Gateway</button>
        <button class="tab" data-tab="notifications">Notifications</button>
        <button class="tab" data-tab="site">Site</button>
      </div>

      <!-- Profile -->
      <section class="tab-pane hidden" data-pane="profile">
        <div class="form-card">
          <h4>Profile</h4>
          <div class="form-row">
            <div class="field"><label class="label">Display name</label><input class="input" value="Site Administrator" /></div>
            <div class="field"><label class="label">Email</label><input class="input" type="email" id="profile-email" /></div>
          </div>
          <div class="form-row">
            <div class="field"><label class="label">Role</label><input class="input" value="Administrator" disabled /></div>
            <div class="field"><label class="label">Phone</label><input class="input" type="tel" placeholder="+60 ..." /></div>
          </div>
          <div class="field"><label class="label">Bio</label><textarea class="textarea" placeholder="Short bio..."></textarea></div>
        </div>
        <div class="form-card">
          <h4>Change Password</h4>
          <div class="field"><label class="label">Current password</label><input class="input" type="password" /></div>
          <div class="form-row">
            <div class="field"><label class="label">New password</label><input class="input" type="password" /></div>
            <div class="field"><label class="label">Confirm new password</label><input class="input" type="password" /></div>
          </div>
        </div>
      </section>

      <!-- Payment Gateway (default open) -->
      <section class="tab-pane" data-pane="payment">

        <div class="form-card">
          <h4>Active Provider</h4>
          <div class="flex gap-4 flex-wrap">
            <label class="checkbox-row"><input type="radio" name="provider" value="stripe" checked /> Stripe</label>
            <label class="checkbox-row"><input type="radio" name="provider" value="paypal" /> PayPal</label>
            <label class="checkbox-row"><input type="radio" name="provider" value="ipay88" /> iPay88</label>
          </div>
        </div>

        <div class="form-card">
          <h4>Stripe Configuration</h4>
          <div class="field">
            <label class="label">API Key</label>
            <div style="display:flex;gap:8px">
              <input class="input mono" id="stripe-key" type="password" value="sk_test_PLACEHOLDER_REPLACE_WITH_YOUR_KEY" />
              <button class="btn btn-secondary" id="toggle-key" type="button">Show</button>
            </div>
          </div>
          <div class="form-row">
            <div class="field"><label class="label">Webhook URL</label><input class="input mono" value="https://auctionhub.example/api/stripe/webhook" /></div>
            <div class="field"><label class="label">Currency</label>
              <select class="select"><option>MYR</option><option>SGD</option><option>USD</option><option>EUR</option></select>
            </div>
          </div>
          <label class="checkbox-row mb-2"><input type="checkbox" checked /> Test mode (use Stripe test keys, no real charges)</label><br/>
          <label class="checkbox-row"><input type="checkbox" checked /> Auto-capture funds when bid wins</label>
        </div>

        <div class="form-card">
          <h4>Payout Settings</h4>
          <div class="form-row">
            <div class="field"><label class="label">Bank account</label><input class="input" value="Maybank ••• 4521" /></div>
            <div class="field"><label class="label">Payout cycle</label>
              <select class="select"><option>Weekly</option><option>Bi-weekly</option><option>Monthly</option></select>
            </div>
          </div>
        </div>

        <div class="flex justify-end gap-3">
          <button class="btn btn-secondary">Cancel</button>
          <button class="btn btn-primary" id="save-payment">Save Changes</button>
        </div>
      </section>

      <!-- Notifications -->
      <section class="tab-pane hidden" data-pane="notifications">
        <div class="form-card">
          <h4>Email Notifications</h4>
          <label class="checkbox-row mb-4" style="display:flex;width:100%;justify-content:space-between"><span>New bid placed on a live auction</span><input type="checkbox" checked /></label>
          <label class="checkbox-row mb-4" style="display:flex;width:100%;justify-content:space-between"><span>Auction ending in 1 hour</span><input type="checkbox" checked /></label>
          <label class="checkbox-row mb-4" style="display:flex;width:100%;justify-content:space-between"><span>Order awaiting payment over 24 hours</span><input type="checkbox" checked /></label>
          <label class="checkbox-row mb-4" style="display:flex;width:100%;justify-content:space-between"><span>Weekly performance digest</span><input type="checkbox" /></label>
          <label class="checkbox-row" style="display:flex;width:100%;justify-content:space-between"><span>System maintenance announcements</span><input type="checkbox" checked /></label>
        </div>
      </section>

      <!-- Site -->
      <section class="tab-pane hidden" data-pane="site">
        <div class="form-card">
          <h4>Site Identity</h4>
          <div class="form-row">
            <div class="field"><label class="label">Site name</label><input class="input" value="AuctionHub" /></div>
            <div class="field"><label class="label">Tagline</label><input class="input" value="Bid. Win. Own." /></div>
          </div>
          <div class="field"><label class="label">Contact email</label><input class="input" type="email" value="hello@auctionhub.example" /></div>
          <div class="field"><label class="label">Timezone</label>
            <select class="select"><option>Asia/Kuala_Lumpur (UTC+8)</option><option>Asia/Singapore (UTC+8)</option><option>UTC</option></select>
          </div>
        </div>
      </section>

    </main>
  </div>
</div>

<div class="toast-host" id="toast-host"></div>

<script src="../assets/js/data.js"></script>
<script src="../assets/js/admin.js"></script>
<script src="../assets/js/settings.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    bootstrapAdminShell();
    initSettingsPage();
  });
</script>

</body>
</html>
