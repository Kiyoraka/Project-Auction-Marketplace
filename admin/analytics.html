<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics — AuctionHub Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../assets/css/shared.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />

  <script src="../assets/js/auth.js"></script>
  <script>guardAdmin();</script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>

<div class="app">

  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <span class="brand-mark">A</span>
      <span>AuctionHub</span>
    </div>
    <nav class="sidebar-nav">
      <a class="snav-item" href="dashboard.html">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Main
      </a>
      <a class="snav-item is-active" href="analytics.html">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
        Analytics
      </a>
      <a class="snav-item" href="products.html">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        Products
      </a>
      <a class="snav-item" href="auctions.html">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m14 13-7.5 7.5c-.83.83-2.17.83-3 0a2.12 2.12 0 0 1 0-3L11 10"/><path d="m16 16 6-6"/><path d="m8 8 6-6"/><path d="m9 7 8 8"/><path d="m21 11-8-8"/></svg>
        Auctions
      </a>
      <a class="snav-item" href="orders.html">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Orders
      </a>
      <a class="snav-item" href="settings.html">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </a>
    </nav>
    <div class="sidebar-foot">
      <div class="user-chip">
        <div class="user-avatar" id="user-initial">A</div>
        <div class="user-info">
          <div class="user-name" id="user-email">admin@gmail.com</div>
          <div class="user-role">Administrator</div>
        </div>
        <button class="logout-btn" id="logout-btn" aria-label="Logout" title="Logout">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-trigger" id="menu-trigger" aria-label="Open menu">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div>
          <div class="topbar-title">Analytics</div>
          <div class="topbar-crumbs">Admin <span>›</span> Analytics</div>
        </div>
      </div>
      <div class="topbar-right">
        <button class="topbar-icon-btn" aria-label="Notifications">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="dot-notify"></span>
        </button>
      </div>
    </header>

    <main class="page">

      <div class="page-head">
        <div>
          <h2>Analytics</h2>
          <div class="page-greeting">Bidding activity, revenue, and category performance.</div>
        </div>
        <div class="filter-chips" id="range-chips" style="margin:0">
          <button class="chip" data-range="7">7d</button>
          <button class="chip is-active" data-range="30">30d</button>
          <button class="chip" data-range="90">90d</button>
          <button class="chip" data-range="365">Year</button>
        </div>
      </div>

      <!-- Bids over time -->
      <section class="panel" style="margin-bottom:16px">
        <div class="panel-head">
          <div class="panel-title">Bids over time</div>
          <div class="text-sm text-muted">Last <span id="range-label">30</span> days</div>
        </div>
        <div class="panel-body" style="padding:16px 20px 20px;">
          <div style="position:relative;height:280px"><canvas id="chart-bids"></canvas></div>
        </div>
      </section>

      <!-- Two-up: categories + win rate -->
      <div class="cols-7-3">
        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">Top Categories</div>
          </div>
          <div class="panel-body" style="padding:16px 20px 20px;">
            <div style="position:relative;height:260px"><canvas id="chart-cats"></canvas></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">Win Rate</div>
          </div>
          <div class="panel-body" style="padding:16px 20px 20px; text-align:center;">
            <div style="position:relative;height:200px"><canvas id="chart-winrate"></canvas></div>
            <div class="text-sm text-muted mt-4">Bids that converted to wins this month.</div>
          </div>
        </section>
      </div>

    </main>
  </div>
</div>

<div class="toast-host" id="toast-host"></div>

<script src="../assets/js/data.js"></script>
<script src="../assets/js/admin.js"></script>
<script src="../assets/js/analytics.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    bootstrapAdminShell();
    initAnalytics();
  });
</script>

</body>
</html>
