  <div class="main">

      <div class="topbar-left">

        <div>
          <div class="topbar-title">Auctions</div>
          <div class="topbar-crumbs">Admin <span>›</span> Auctions</div>
        </div>
      </div>
      <div class="topbar-right">

      </div>

    <main class="page">

      <div class="tabs" id="auction-tabs">
        <button class="tab is-active" data-tab="live">Live <span class="tab-count" id="count-live">0</span></button>
        <button class="tab" data-tab="scheduled">Scheduled <span class="tab-count" id="count-scheduled">0</span></button>
        <button class="tab" data-tab="ended">Ended <span class="tab-count" id="count-ended">0</span></button>
      </div>

      <section class="panel">
        <div class="panel-body" style="padding:0">
          <table class="atable">
            <thead>
              <tr>
                <th>Item</th>
                <th>Start</th>
                <th>Current Bid</th>
                <th>Bids</th>
                <th>Time</th>
                <th>Status</th>
              </tr>
            </thead>

      </section>

    </main>

</div>

<!-- Auction Detail Modal -->
<div class="modal-backdrop" id="auction-detail-modal">
  <div class="modal modal-lg" role="dialog" aria-modal="true">
    <div class="modal-header">
      <span class="modal-title">Auction Detail</span>
      <button class="modal-close" data-close-detail aria-label="Close">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="detail-body"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close-detail>Close</button>
      <button class="btn btn-danger" id="end-auction">End Auction Early</button>
    </div>
  </div>
</div>

<div class="toast-host" id="toast-host"></div>

<script src="../assets/js/data.js"></script>
<script src="../assets/js/admin.js"></script>
<script>
  let activeTab = "live";
  let activeDetailId = null;

  document.addEventListener("DOMContentLoaded", function () {
    bootstrapAdminShell();
    initAuctionsPage();
  });

  function initAuctionsPage() {
    /* Tab counts */
    document.getElementById("count-live").textContent      = AUCTIONS.filter(a => a.status === "live").length;
    document.getElementById("count-scheduled").textContent = AUCTIONS.filter(a => a.status === "scheduled").length;
    document.getElementById("count-ended").textContent     = AUCTIONS.filter(a => a.status === "ended").length;

    document.getElementById("auction-tabs").addEventListener("click", function (e) {
      const t = e.target.closest(".tab");
      if (!t) return;
      document.querySelectorAll(".tab").forEach(x => x.classList.remove("is-active"));
      t.classList.add("is-active");
      activeTab = t.getAttribute("data-tab");
      paint();
    });

    bindModalCloseTriggers("auction-detail-modal", "data-close-detail");

    document.getElementById("end-auction").addEventListener("click", function () {
      if (!activeDetailId) return;
      const a = findAuction(activeDetailId);
      if (a && a.status === "live") {
        a.status = "ended";
        a.endsAt = Date.now();
        showToast("Auction ended.", "success");
      }
      closeModal("auction-detail-modal");
      paint();
    });

    paint();
  }

  function paint() {
    const list = AUCTIONS.filter(a => a.status === activeTab);
    document.getElementById("auctions-tbody").innerHTML = list.map(function (a) {
      const product = findProduct(a.productId);
      if (!product) return "";
      return [
        '<tr class="row-clickable" data-detail="' + a.id + '">',
          '<td><div class="item-cell">',
            '<div class="item-thumb" style="background-image:url(\'' + product.image + '\')"></div>',
            '<div><div style="font-weight:600">' + escapeHtmlAdmin(product.name) + '</div>',
            '<div class="text-xs text-muted">' + escapeHtmlAdmin(product.category) + '</div></div>',
          '</div></td>',
          '<td class="num">' + formatRMFull(product.startingBid) + '</td>',
          '<td class="num text-primary font-bold">' + formatRMFull(a.currentBid) + '</td>',
          '<td class="num">' + a.bidCount + '</td>',
          '<td class="num">' + (a.status === "live" ? timeLeft(a.endsAt) : a.status === "scheduled" ? "Starts " + timeLeft(a.startsAt) : "Ended") + '</td>',
          '<td>' + statusPill(a.status) + '</td>',
        '</tr>'
      ].join("");
    }).join("");

    document.querySelectorAll("[data-detail]").forEach(function (row) {
      row.addEventListener("click", function () {
        openDetail(row.getAttribute("data-detail"));
      });
    });
  }

  function openDetail(id) {
    const a = findAuction(id);
    if (!a) return;
    const product = findProduct(a.productId);
    const bids = bidsForAuction(id);
    activeDetailId = id;

    const body = document.getElementById("detail-body");
    body.innerHTML = [
      '<div class="bid-context" style="margin-bottom:20px">',
        '<div class="bid-context-img" style="background-image:url(\'' + product.image + '\')"></div>',
        '<div class="bid-context-body">',
          '<div class="bid-context-title">' + escapeHtmlAdmin(product.name) + '</div>',
          '<div class="bid-context-meta">',
            '<div>Current bid: <strong>' + formatRMFull(a.currentBid) + '</strong></div>',
            '<div>Total bids: <strong>' + a.bidCount + '</strong></div>',
            '<div>Status: <strong>' + a.status + '</strong></div>',
          '</div>',
        '</div>',
      '</div>',
      '<h5 style="margin-bottom:12px">Bid History (' + bids.length + ')</h5>',
      bids.length === 0 ? '<div class="text-muted text-sm">No bids yet.</div>' : (
        '<div style="max-height:280px;overflow:auto">' +
        bids.map(function (b) {
          const u = findUser(b.userId);
          return '<div class="es-item">' +
            '<div class="user-avatar">' + (u ? u.username[0].toUpperCase() : "?") + '</div>' +
            '<div class="es-body">' +
              '<div class="es-title">' + (u ? escapeHtmlAdmin(u.username) : "anonymous") + '</div>' +
              '<div class="es-meta">' + timeAgo(b.placedAt) + '</div>' +
            '</div>' +
            '<div class="num font-bold">' + formatRMFull(b.amount) + '</div>' +
          '</div>';
        }).join("") +
        '</div>'
      )
    ].join("");

    document.getElementById("end-auction").style.display = (a.status === "live") ? "" : "none";
    openModal("auction-detail-modal");
  }
</script>

</body>
</html>
