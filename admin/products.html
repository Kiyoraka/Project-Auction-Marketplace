<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products — AuctionHub Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../assets/css/shared.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />

  <script src="../assets/js/auth.js"></script>
  <script>guardAdmin();</script>
</head>
<body>

<div class="app">

  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <span class="brand-mark">A</span>
      <span>AuctionHub</span>
    </div>
    <nav class="sidebar-nav">
      <a class="snav-item" href="dashboard.html"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Main</a>
      <a class="snav-item" href="analytics.html"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>Analytics</a>
      <a class="snav-item is-active" href="products.html"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>Products</a>
      <a class="snav-item" href="auctions.html"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m14 13-7.5 7.5c-.83.83-2.17.83-3 0a2.12 2.12 0 0 1 0-3L11 10"/><path d="m16 16 6-6"/><path d="m8 8 6-6"/><path d="m9 7 8 8"/><path d="m21 11-8-8"/></svg>Auctions</a>
      <a class="snav-item" href="orders.html"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>Orders</a>
      <a class="snav-item" href="settings.html"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</a>
    </nav>
    <div class="sidebar-foot">
      <div class="user-chip">
        <div class="user-avatar" id="user-initial">A</div>
        <div class="user-info">
          <div class="user-name" id="user-email">admin@gmail.com</div>
          <div class="user-role">Administrator</div>
        </div>
        <button class="logout-btn" id="logout-btn" aria-label="Logout"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
      </div>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-trigger" id="menu-trigger" aria-label="Open menu"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <div>
          <div class="topbar-title">Products</div>
          <div class="topbar-crumbs">Admin <span>›</span> Products</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="search-input">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="input" type="search" id="prod-search" placeholder="Search products..." />
        </div>
        <button class="btn btn-primary" id="open-add-product">
          <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Product
        </button>
      </div>
    </header>

    <main class="page">

      <!-- Filters -->
      <div class="flex gap-3 mb-4 flex-wrap">
        <select class="select" id="filter-cat" style="max-width:200px">
          <option value="">All categories</option>
        </select>
        <select class="select" id="filter-status" style="max-width:200px">
          <option value="">All statuses</option>
          <option value="Listed">Listed</option>
          <option value="Draft">Draft</option>
          <option value="Sold">Sold</option>
        </select>
      </div>

      <section class="panel">
        <div class="panel-body" style="padding:0">
          <table class="atable">
            <thead>
              <tr>
                <th style="width:40px"><input type="checkbox" /></th>
                <th>Product</th>
                <th>Category</th>
                <th>Stock</th>
                <th>Starting Bid</th>
                <th>Status</th>
                <th style="width:100px">Actions</th>
              </tr>
            </thead>
            <tbody id="products-tbody"></tbody>
          </table>
          <div class="m-list" id="products-mlist"></div>
        </div>
        <div class="panel-foot" id="products-foot">Loading...</div>
      </section>

    </main>
  </div>
</div>

<!-- Add Product Modal -->
<div class="modal-backdrop" id="add-product-modal">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <span class="modal-title">New Product</span>
      <button class="modal-close" data-close-add-product aria-label="Close">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="add-product-form" novalidate>
        <div class="field">
          <label class="label" for="ap-name">Name</label>
          <input class="input" id="ap-name" required placeholder="Product name" />
        </div>
        <div class="field">
          <label class="label" for="ap-cat">Category</label>
          <select class="select" id="ap-cat" required></select>
        </div>
        <div class="field">
          <label class="label" for="ap-image">Image URL</label>
          <input class="input" id="ap-image" placeholder="https://... (optional)" />
        </div>
        <div class="field">
          <label class="label" for="ap-desc">Description</label>
          <textarea class="textarea" id="ap-desc" placeholder="Brief lot description"></textarea>
        </div>
        <div class="field">
          <label class="label" for="ap-bid">Starting bid (RM)</label>
          <input class="input mono" id="ap-bid" type="number" step="10" min="0" required />
        </div>
        <div class="field-error hidden" id="ap-error"></div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close-add-product>Cancel</button>
      <button class="btn btn-primary" id="ap-save">Save Product</button>
    </div>
  </div>
</div>

<div class="toast-host" id="toast-host"></div>

<script src="../assets/js/data.js"></script>
<script src="../assets/js/admin.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    bootstrapAdminShell();
    initProductsPage();
  });

  function initProductsPage() {
    /* Populate category filters */
    const catFilter = document.getElementById("filter-cat");
    const apCat     = document.getElementById("ap-cat");
    CATEGORIES.forEach(function (c) {
      catFilter.insertAdjacentHTML("beforeend", '<option value="' + c + '">' + c + '</option>');
      apCat.insertAdjacentHTML("beforeend", '<option value="' + c + '">' + c + '</option>');
    });

    paint();
    document.getElementById("filter-cat").addEventListener("change", paint);
    document.getElementById("filter-status").addEventListener("change", paint);
    document.getElementById("prod-search").addEventListener("input", paint);

    /* Add product modal */
    document.getElementById("open-add-product").addEventListener("click", function () { openModal("add-product-modal"); });
    bindModalCloseTriggers("add-product-modal", "data-close-add-product");

    document.getElementById("ap-save").addEventListener("click", function () {
      const name = document.getElementById("ap-name").value.trim();
      const cat  = document.getElementById("ap-cat").value;
      const img  = document.getElementById("ap-image").value.trim();
      const desc = document.getElementById("ap-desc").value.trim();
      const bid  = parseInt(document.getElementById("ap-bid").value, 10);
      const err  = document.getElementById("ap-error");

      if (!name || !cat || !Number.isFinite(bid) || bid < 0) {
        err.textContent = "Name, category, and a valid starting bid are required.";
        err.classList.remove("hidden");
        return;
      }
      const newId = "p" + (PRODUCTS.length + 1);
      PRODUCTS.unshift({
        id: newId, name: name, category: cat,
        image: img || ("https://picsum.photos/seed/" + newId + "/400/300"),
        description: desc, stock: 1, status: "Draft", startingBid: bid
      });
      closeModal("add-product-modal");
      document.getElementById("add-product-form").reset();
      err.classList.add("hidden");
      paint();
      showToast("Product \"" + name + "\" added.", "success");
    });
  }

  function paint() {
    const cat    = document.getElementById("filter-cat").value;
    const status = document.getElementById("filter-status").value;
    const q      = document.getElementById("prod-search").value.toLowerCase().trim();

    const list = PRODUCTS.filter(function (p) {
      if (cat && p.category !== cat) return false;
      if (status && p.status !== status) return false;
      if (q && p.name.toLowerCase().indexOf(q) === -1) return false;
      return true;
    });

    if (list.length === 0) {
      document.getElementById("products-tbody").innerHTML =
        '<tr><td colspan="7" style="padding:48px;text-align:center;color:var(--text-muted);font-size:14px">No products match these filters.</td></tr>';
      document.getElementById("products-mlist").innerHTML =
        '<div class="m-list-empty">No products match these filters.</div>';
      document.getElementById("products-foot").textContent = "Showing 0 of " + PRODUCTS.length + " products";
      return;
    }

    /* Mobile cards */
    document.getElementById("products-mlist").innerHTML = list.map(function (p) {
      const statusBadge =
        p.status === "Listed" ? '<span class="badge badge-success">Listed</span>' :
        p.status === "Draft"  ? '<span class="badge badge-warning">Draft</span>'  :
        p.status === "Sold"   ? '<span class="badge">Sold</span>'                  :
        '<span class="badge">' + escapeHtmlAdmin(p.status) + '</span>';
      return [
        '<div class="m-card">',
          '<div class="m-card-thumb" style="background-image:url(\'' + p.image + '\')"></div>',
          '<div class="m-card-body">',
            '<div class="m-card-row1">',
              '<div class="m-card-title">' + escapeHtmlAdmin(p.name) + '</div>',
              statusBadge,
            '</div>',
            '<div class="m-card-meta">' + escapeHtmlAdmin(p.category) + ' · <span class="price">' + formatRMFull(p.startingBid) + '</span></div>',
            '<div class="m-card-meta">Stock: <span class="num">' + p.stock + '</span></div>',
          '</div>',
        '</div>'
      ].join("");
    }).join("");

    document.getElementById("products-tbody").innerHTML = list.map(function (p) {
      const statusBadge =
        p.status === "Listed" ? '<span class="badge badge-success">Listed</span>' :
        p.status === "Draft"  ? '<span class="badge badge-warning">Draft</span>'  :
        p.status === "Sold"   ? '<span class="badge">Sold</span>'                  :
        '<span class="badge">' + escapeHtmlAdmin(p.status) + '</span>';
      return [
        '<tr>',
          '<td><input type="checkbox" /></td>',
          '<td><div class="item-cell">',
            '<div class="item-thumb" style="background-image:url(\'' + p.image + '\')"></div>',
            '<div><div style="font-weight:600">' + escapeHtmlAdmin(p.name) + '</div>',
            '<div class="text-xs text-muted" style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escapeHtmlAdmin(p.description || "") + '</div></div>',
          '</div></td>',
          '<td>' + escapeHtmlAdmin(p.category) + '</td>',
          '<td class="num">' + p.stock + '</td>',
          '<td class="num">' + formatRMFull(p.startingBid) + '</td>',
          '<td>' + statusBadge + '</td>',
          '<td>',
            '<button class="btn btn-ghost btn-sm" title="Edit"><svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>',
            '<button class="btn btn-ghost btn-sm" title="Delete" data-del="' + p.id + '"><svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>',
          '</td>',
        '</tr>'
      ].join("");
    }).join("");

    document.getElementById("products-foot").textContent = "Showing " + list.length + " of " + PRODUCTS.length + " products";

    /* Wire delete */
    document.querySelectorAll("[data-del]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        const id = btn.getAttribute("data-del");
        const idx = PRODUCTS.findIndex(p => p.id === id);
        if (idx === -1) return;
        const removed = PRODUCTS.splice(idx, 1)[0];
        paint();
        showToast("Product \"" + removed.name + "\" removed.", "danger");
      });
    });
  }
</script>

</body>
</html>
